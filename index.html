<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객가치 실행력 OX퀴즈</title>
  <link rel="stylesheet" href="styles.css">
 <!-- Supabase JS UMD -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
</head>
<body>
  <!-- 타이틀(시작) 페이지 -->
  <section id="title-page">
    <h1>우리 회사 고객가치혁신 활동<br> 어디까지 알고 있나요?</h1>
    <p>고객가치혁신 활동에 대해 바르게 알아보는 <b>총 10문항의 OX퀴즈</b>입니다 <br> <br>모두 풀고 마지막 페이지에서 <b>응답자 정보</b>와 <b>고객가치 실행 사례</b>를 자랑하면 <br> <span style="color:#ff4d8d; font-weight:bold;">선물이 와르르~!🎁🎈</span></p>
    <button id="start-btn">시작하기</button>
  </section>
  
  <!-- 퀴즈 진행 페이지 -->
  <section id="quiz-page" style="display:none;">
    <div class="status-bar">
      <span id="question-number">1/3</span>
      <div class="timer-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
    <div id="question-text"></div>
    <div class="ox-btns">
      <button class="ox-btn o-btn" data-answer="O">O</button>
      <button class="ox-btn x-btn" data-answer="X">X</button>
    </div>
    <div id="answer-feedback" style="display:none;"></div>
    <button id="next-btn" style="display:none;">다음 문제</button>
  </section>

  <!-- 결과 요약 페이지 -->
  <section id="result-page" style="display:none;">
    <h2>결과 요약</h2>
    <div id="score-summary"></div>
    <div id="score-msg" style="margin:1.2em 0 2em 0; font-size:1.22em; font-weight:600;"></div>
    <button id="to-submit-info-btn">응답자 정보 제출 및<br>고객가치 실행사례 자랑하기</button>
    <button id="retry-btn" style="margin-top:1.7em;">🔄 다시 풀기</button>
  </section>

  <!-- 응답자 정보/고객가치 실행사례 제출 페이지 -->
  <section id="user-info-page" style="display:none;">
    <h2>응답자 정보 및 고객가치 실행사례 제출</h2>
    <form id="info-form">
      <label>
        부문<br>
        <select id="group1" required style="width: 250px; max-width: 100%;">
          <option value="">부문을 선택하세요</option>
          <option value="BX부문">BX부문</option>
          <option value="CX부문">CX부문</option>
          <option value="LGCC">LGCC</option>
          <option value="CFO">CFO</option>
          <option value="CHO">CHO</option>
          <option value="CSO">CSO</option>
          <option value="CEO직속">CEO직속</option>
        </select>
      </label>
      <br><br>
      <label>
        사업부/센터/실<br>
        <select id="group2" required style="width: 250px; max-width: 100%;">
          <option value="">먼저 부문을 선택하세요</option>
        </select>
      </label>
      <br><br>
      <label>
        이름<br>
        <input type="text" id="username" required placeholder="이름을 입력하세요" style="width: 250px; max-width: 100%;">
      </label>
      <br><br>
      <label>
        고객가치 실행사례 자랑하기<br>
 <span class="example-guide">
    ✔️ 고객만족도 조사 VoC를 통해 확인된 고객 불편을 개선한 사례<br>
    ✔️ AI를 활용해 고객에게 새로운 경험을 제공하거나, 비용·시간을 절감한 사례<br>
    ✔️ 구성원이 고객가치를 효과적으로 실천할 수 있는 환경을 구축한 사례<br>
      (ex. 업무 프로세스 개선, 성과보상 제도 마련, 고객 중심 문화 형성 등) <br><br>
    *위 예시 외, 고객가치를 높이기 위해 한 활동이나 새로운 경험을 제공한 사례가 있다면 자유롭게 작성해주세요.
  </span>
        <textarea id="subjective" rows="5" required placeholder="동료 또는 본인의 경험을 마음껏 자랑해주세요.
멋진 사례를 남겨주실수록 선물 당첨 확률이 높아져요!"
        style="width: 700px; max-width:100%;"></textarea>
      </label>
      <br><br>
      <button id="submit-info-btn" type="submit">제출</button>
    </form>
    <div id="submit-success" style="display:none; color:#257857; font-weight:bold; margin-top:1.2em;">제출이 완료되었습니다! 감사합니다 👍</div>
  </section>

  <script src="script.js"></script>
</body>
</html>
