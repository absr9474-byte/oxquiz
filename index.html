<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객가치 실행력 OX퀴즈</title>
  <link rel="stylesheet" href="styles.css">
 <!-- Supabase JS UMD -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
</head>
<body>
  <!-- 타이틀(시작) 페이지 -->
  <section id="title-page">
    <h1>우리 회사 고객가치혁신<br>OX퀴즈</h1>
    <p>고객가치혁신에 대해 바르게 알아보는 총 10문항의 OX퀴즈입니다 <br> <br>모두 풀고 마지막 페이지에서 <b>응답자 정보</b>와 <b>고객가치 실행 사례</b>를 자랑하면 <br> <span style="color:#ff4d8d; font-weight:bold;">선물이 와르르~!🎁🎈</span> .</p>
    <button id="start-btn">시작하기</button>
  </section>
  
  <!-- 퀴즈 진행 페이지 -->
  <section id="quiz-page" style="display:none;">
    <div class="status-bar">
      <span id="question-number">1/3</span>
      <div class="timer-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
    <div id="question-text"></div>
    <div class="ox-btns">
      <button class="ox-btn o-btn" data-answer="O">O</button>
      <button class="ox-btn x-btn" data-answer="X">X</button>
    </div>
    <div id="answer-feedback" style="display:none;"></div>
    <button id="next-btn" style="display:none;">다음 문제</button>
  </section>

  <!-- 결과 요약 페이지 -->
  <section id="result-page" style="display:none;">
    <h2>결과 요약</h2>
    <div id="score-summary"></div>
    <div id="score-msg" style="margin:1.2em 0 2em 0; font-size:1.22em; font-weight:600;"></div>
    <button id="to-submit-info-btn">응답자 정보 및 실행사례 제출</button>
    <button id="retry-btn" style="margin-top:1.7em;">🔄 다시 풀기</button>
  </section>

  <!-- 응답자 정보/고객가치 실행사례 제출 페이지 -->
  <section id="user-info-page" style="display:none;">
    <h2>응답자 정보 및 고객가치 실행사례 제출</h2>
    <form id="info-form">
      <label>
        부문 선택<br>
        <select id="group1" required>
          <option value="">부문을 선택하세요</option>
          <option value="BX부문">BX부문</option>
          <option value="CX부문">CX부문</option>
          <option value="LGCC">LGCC</option>
          <option value="CFO">CFO</option>
          <option value="CHO">CHO</option>
          <option value="CSO">CSO</option>
          <option value="CEO직속">CEO직속</option>
        </select>
      </label>
      <br><br>
      <label>
        사업부 선택<br>
        <select id="group2" required>
          <option value="">먼저 부문을 선택하세요</option>
        </select>
      </label>
      <br><br>
      <label>
        이름<br>
        <input type="text" id="username" required placeholder="이름을 입력하세요">
      </label>
      <br><br>
      <label>
        전화번호<br>
        <input type="tel" id="number" required pattern="^01[0-9]{8,9}$" maxlength="11" placeholder="예: 01012345678">
      </label>
      <br><br>
      <label>
        고객가치 실행사례 자랑하기<br>
        <textarea id="subjective" rows="5" required placeholder="퀴즈를 통해 알게 된 고객가치를 실제로 잘 실천한 사례가 있나요? 동료나 본인의 경험을 구체적으로 소개해주세요."></textarea>
      </label>
      <br><br>
      <button id="submit-info-btn" type="submit">제출</button>
    </form>
    <div id="submit-success" style="display:none; color:#257857; font-weight:bold; margin-top:1.2em;">제출이 완료되었습니다! 감사합니다 👍</div>
  </section>

  <script src="script.js"></script>
</body>
</html>
