<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객가치혁신 OX퀴즈</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 🟦 타이틀(시작) 페이지 -->
  <section id="title-page">
    <h1>우리 회사 고객가치혁신<br>OX퀴즈</h1>
    <p>고객가치혁신에 대해 바르게 알아보는 OX퀴즈! <br>모두 풀고 나면 결과를 확인할 수 있습니다.</p>
    <button id="start-btn">시작하기</button>
  </section>

  <!-- 🟦 퀴즈 진행 페이지 -->
  <section id="quiz-page" style="display:none;">
    <div class="status-bar">
      <span id="question-number">1/3</span>
      <div class="timer-wrap">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
    <div id="question-text"></div>
    <div class="ox-btns">
      <button class="ox-btn o-btn" data-answer="O">O</button>
      <button class="ox-btn x-btn" data-answer="X">X</button>
    </div>
    <div id="answer-feedback" style="display:none;"></div>
    <button id="next-btn" style="display:none;">다음 문제</button>
  </section>

  <!-- 🟦 결과 페이지 -->
  <section id="result-page" style="display:none;">
    <h2>결과 요약</h2>
    <div id="score-summary"></div>

    <!-- 요구사항 4: 사례 자랑 버튼과 창 -->
    <button id="share-btn" style="margin:1em 0 2em 0;">동료 고객가치 실행 사례 자랑하기</button>

    <!-- 사례 입력 폼 영역 (클릭 시 표시) -->
    <div id="share-area" style="display:none; flex-direction:column; align-items:center;">
      <p style="font-weight:bold; margin-top:0;">동료의 고객가치 실행 사례를 자랑해주세요!</p>
      <textarea id="share-input" rows="5" placeholder="여기에 내용을 입력하세요" style="width:93%; resize:vertical; border-radius:8px; border:1px solid #ddd; font-size:1em; padding:0.7em; margin-bottom:0.7em;"></textarea>
      <button id="submit-share-btn">제출</button>
      <div id="share-success" style="display:none; color:#257857; font-weight:bold; margin-top:1em;">제출이 완료되었습니다! 감사합니다 👍</div>
    </div>

    <table id="result-table"></table>
    <button id="retry-btn" style="margin-top:1.7em;">🔄 다시 풀기</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
